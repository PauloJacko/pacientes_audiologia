{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audiometría</title>

    <link rel="stylesheet" href="{% static 'evaluaciones/css/audiometria.css' %}">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <img src="{% static 'Login/img/logo-png.png' %}" class="logo-header">

        <div class="header-text">
            <span class="title">Audiometría</span>
            <span class="subtitle">Evaluación clínica</span>
        </div>
    </div>

    <div class="header-right">
        <a href="{% url 'ver_paciente' paciente.id %}" class="btn-back">← Volver</a>
        <a href="{% url 'logout' %}" class="btn-logout">Cerrar sesión</a>
    </div>
</div>

<!-- CONTENIDO -->
<main class="dashboard">

    <!-- PACIENTE -->
    <div class="card">
        <h2>{{ paciente.nombre }}</h2>
        <p class="meta">RUT: {{ paciente.rut }}</p>
    </div>

    <!-- MODO -->
    <div class="card">
        <h3>Modo de registro</h3>

        <div class="radio-group">
            <label>
                <input type="radio" name="modo" value="manual" checked>
                Manual
            </label>

            <label>
                <input type="radio" name="modo" value="archivo">
                Adjuntar archivo / video
            </label>
        </div>
    </div>

    <!-- TIPO -->
    <div class="card">
        <h3>Tipo de audiometría</h3>

        <div class="radio-group">
            <label>
                <input type="radio" name="tipo" value="tonal" checked>
                Audiometría tonal clásica
            </label>

            <label>
                <input type="radio" name="tipo" value="campo_libre">
                Campo libre (binaural)
            </label>
        </div>
    </div>

    <!-- BLOQUE MANUAL -->
    <div id="bloque-manual">

        <!-- AUDIOMETRÍA TONAL -->
        <div class="card">
            <h3>Audiometría</h3>

            <!-- Aquí irá la tabla -->
            <div class="audiometria-layout">

    <!-- PANEL IZQUIERDO -->
    <div class="audio-controls">

        <h4>Oído</h4>
        <div class="control-group">
            <button class="ctrl-btn active" data-ear="right">OD (Rojo)</button>
            <button class="ctrl-btn" data-ear="left">OI (Azul)</button>
        </div>

        <h4>Tipo</h4>
        <div class="control-group">
            <button class="ctrl-btn active" data-type="va">Vía aérea</button>
            <button class="ctrl-btn" data-type="vo">Vía ósea</button>
            <button class="ctrl-btn" data-mask="true">Enmascarado</button>
        </div>

        <h4>Opciones</h4>
        <div class="control-group">
            <button class="ctrl-btn" data-extra="nr">Sin respuesta</button>
            <button class="ctrl-btn" data-extra="ldl">LDL</button>
        </div>

    </div>

    <!-- GRÁFICO -->
    <div class="audio-chart-container">
        <canvas id="audiograma" width="800" height="450"></canvas>
    </div>

</div>
        </div>

        <!-- LOGOAUDIOMETRÍA -->
        <div class="card">
            <h3>Logoaudiometría</h3>

            <div class="form-grid compact">
                <div>
                    <label>SRT OD</label>
                    <input type="number" name="srt_od">
                </div>

                <div>
                    <label>SRT OI</label>
                    <input type="number" name="srt_oi">
                </div>

                <div>
                    <label>Discriminación (%) OD</label>
                    <input type="number" name="sds_od">
                </div>

                <div>
                    <label>Discriminación (%) OI</label>
                    <input type="number" name="sds_oi">
                </div>
            </div>
        </div>

    </div>

    <!-- BLOQUE ARCHIVO -->
    <div id="bloque-archivo" style="display:none;">
        <div class="card">
            <h3>Adjuntar archivo / video</h3>

            <input type="file" name="archivo" accept=".pdf,image/*,video/*">
        </div>
    </div>

    <!-- OBSERVACIONES -->
    <div class="card">
        <h3>Observaciones</h3>
        <textarea name="observaciones"></textarea>
    </div>

    <!-- BOTÓN -->
    <div class="card">
        <button class="btn">Guardar Audiometría</button>
    </div>

</main>

<!-- JS -->
<script>
const radiosModo = document.querySelectorAll('input[name="modo"]');
const bloqueManual = document.getElementById("bloque-manual");
const bloqueArchivo = document.getElementById("bloque-archivo");

radiosModo.forEach(radio => {
    radio.addEventListener("change", () => {
        if (radio.value === "manual" && radio.checked) {
            bloqueManual.style.display = "block";
            bloqueArchivo.style.display = "none";
        }

        if (radio.value === "archivo" && radio.checked) {
            bloqueManual.style.display = "none";
            bloqueArchivo.style.display = "block";
        }
    });
});

// Audiograma //

const canvas = document.getElementById("audiograma");
const ctx = canvas.getContext("2d");

/* CONFIG REAL */
const freqs = [125,250,500,1000,2000,3000,4000,6000,8000];
const dbs = [];
for(let i=0;i<=120;i+=5) dbs.push(i);

const padding = { top: 40, left: 50, right: 20, bottom: 20 };

const chartWidth = canvas.width - padding.left - padding.right;
const chartHeight = canvas.height - padding.top - padding.bottom;

/* ESTADO CLÍNICO */
let current = {
    ear: "right",
    type: "va",
    category: "va",  
    modifier: null,   
    masked: false
};

let data = [];

/* POSICIONES */
function getX(index){
    return padding.left + (index * (chartWidth/(freqs.length-1)));
}

function getY(db){
    return padding.top + (db/120)*chartHeight;
}

/* GRID */
function drawGrid(){
    ctx.save(); 

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.font = "12px Arial";
    ctx.fillStyle = "#333"; 

    // FRECUENCIAS ARRIBA
    freqs.forEach((f,i)=>{
        let x = getX(i);

        ctx.strokeStyle = "#ccc"; 
        ctx.beginPath();
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, canvas.height-padding.bottom);
        ctx.stroke();

        ctx.fillText(f, x-10, 20);
    });

    // dB
    dbs.forEach(d=>{
        let y = getY(d);

        ctx.strokeStyle = d % 10 === 0 ? "#bbb" : "#eee";

        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(canvas.width-padding.right, y);
        ctx.stroke();

        if(d % 10 === 0){
            ctx.fillStyle = "#333"; 
            ctx.fillText(d, 5, y+4);
        }
    });

    ctx.restore();
}

/* SÍMBOLOS */

function drawCircle(x,y,color){
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.arc(x,y,7,0,Math.PI*2);
    ctx.stroke();
}

function drawX(x,y,color){
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x-6,y-6);
    ctx.lineTo(x+6,y+6);
    ctx.moveTo(x+6,y-6);
    ctx.lineTo(x-6,y+6);
    ctx.stroke();
}

function drawTriangle(x,y,color){
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y-7);
    ctx.lineTo(x-7, y+7);
    ctx.lineTo(x+7, y+7);
    ctx.closePath();
    ctx.stroke();
}

function drawSquare(x,y,color){
    ctx.strokeStyle = color;
    ctx.strokeRect(x-6, y-6, 12, 12);
}

function drawBone(x,y,ear,masked,color){
    ctx.fillStyle = color;
    ctx.font = "16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    let symbol = "";

    if(ear === "right"){
        symbol = masked ? "[" : "<";
    } else {
        symbol = masked ? "]" : ">";
    }

    ctx.fillText(symbol, x, y);
}

function drawNRArrow(x,y,color){
    ctx.strokeStyle = color;

    ctx.beginPath();
    ctx.moveTo(x, y+6);
    ctx.lineTo(x, y+16);
    ctx.lineTo(x-4, y+12);
    ctx.moveTo(x, y+16);
    ctx.lineTo(x+4, y+12);
    ctx.stroke();
}

function drawLDL(x,y,color){
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x,y-8);
    ctx.lineTo(x-6,y+6);
    ctx.lineTo(x+6,y+6);
    ctx.closePath();
    ctx.stroke();
}

/* DIBUJO */
function drawPoints(){
    data.forEach(p=>{
        const x = getX(freqs.indexOf(p.freq));
        const y = getY(p.db);

        const color = p.ear === "right" ? "red" : "blue";

        // LDL (independiente)
        if(p.category === "ldl"){
            drawLDL(x,y,color);

            if(p.modifier === "nr"){
                drawNRArrow(x,y,color);
            }
            return;
        }

        // VÍA ÓSEA
        if(p.type === "vo"){
            drawBone(x,y,p.ear,p.masked,color);
        }
        else if(p.type === "va"){
            if(p.masked){
                if(p.ear === "right"){
                    drawTriangle(x,y,color);
                } else {
                    drawSquare(x,y,color);
                }
            } else {
                if(p.ear === "right"){
                    drawCircle(x,y,color);
                } else {
                    drawX(x,y,color);
                }
            }
        }

        // NR
        if(p.modifier === "nr"){
            drawNRArrow(x,y,color);
        }
    });
}

/* CLICK */
canvas.addEventListener("click", function(e){
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let closestFreq = freqs.reduce((a,b)=>
        Math.abs(getX(freqs.indexOf(a))-x) < Math.abs(getX(freqs.indexOf(b))-x) ? a : b
    );

    let closestDb = Math.round((y - padding.top)/chartHeight * 120 / 5)*5;

    if(closestDb < 0) closestDb = 0;
    if(closestDb > 120) closestDb = 120;

    const existingIndex = data.findIndex(p =>
        p.freq === closestFreq &&
        p.ear === current.ear &&
        p.category === current.category
    );

    if(existingIndex !== -1){
        data.splice(existingIndex, 1);
    } else {
        data.push({
            freq: closestFreq,
            db: closestDb,
            ear: current.ear,
            type: current.type,
            category: current.category,
            modifier: current.modifier,
            masked: current.masked
        });
    }

    drawGrid();
    drawPoints();
});

function syncUI(){

    // LIMPIAR TODO
    document.querySelectorAll(".ctrl-btn")
        .forEach(b => b.classList.remove("active"));

    // OÍDO
    document.querySelector(`[data-ear="${current.ear}"]`)
        ?.classList.add("active");

    // TIPO (solo si NO es LDL)
    if(current.category !== "ldl"){
        document.querySelector(`[data-type="${current.type}"]`)
            ?.classList.add("active");
    }

    // LDL
    if(current.category === "ldl"){
        document.querySelector(`[data-extra="ldl"]`)
            ?.classList.add("active");

        // LDL siempre VA visualmente
        document.querySelector(`[data-type="va"]`)
            ?.classList.add("active");
    }

    // NR
    if(current.modifier === "nr"){
        document.querySelector(`[data-extra="nr"]`)
            ?.classList.add("active");
    }

    // MASK
    if(current.masked){
        document.querySelector(`[data-mask]`)
            ?.classList.add("active");
    }
}

/* BOTONES */
document.querySelectorAll(".ctrl-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{

        // OÍDO
        if(btn.dataset.ear){
            current.ear = btn.dataset.ear;
            current.modifier = null;
        }

        // TIPO
        if(btn.dataset.type){
            current.type = btn.dataset.type;
            current.category = btn.dataset.type;
            current.modifier = null;
        }

        // LDL
        if(btn.dataset.extra === "ldl"){

            if(current.category === "ldl"){
                current.category = current.type;
            } else {
                current.category = "ldl";
                current.type = "va";
            }
        }

        // NR
        if(btn.dataset.extra === "nr"){
            current.modifier = current.modifier === "nr" ? null : "nr";
        }

        // MASK
        if(btn.dataset.mask){
            current.masked = !current.masked;
            current.modifier = null; // opcional clínico
        }

        syncUI(); // 🔥 LA CLAVE
    });
});

/* INIT */
drawGrid();
syncUI();
</script>

</body>
</html>
